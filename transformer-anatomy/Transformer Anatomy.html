<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transformer Anatomy — 인터랙티브 해부도 v2</title>
<link rel="stylesheet" href="../_ds/ml-animations-design-system-94795768-6cca-4336-8dca-6ececad5a6ab/tokens/fonts.css">
<link rel="stylesheet" href="../_ds/ml-animations-design-system-94795768-6cca-4336-8dca-6ececad5a6ab/tokens/colors.css">
<link rel="stylesheet" href="../_ds/ml-animations-design-system-94795768-6cca-4336-8dca-6ececad5a6ab/tokens/typography.css">
<link rel="stylesheet" href="../_ds/ml-animations-design-system-94795768-6cca-4336-8dca-6ececad5a6ab/tokens/spacing.css">
<link rel="stylesheet" href="../_ds/ml-animations-design-system-94795768-6cca-4336-8dca-6ececad5a6ab/tokens/animation.css">
<link rel="stylesheet" href="../_ds/ml-animations-design-system-94795768-6cca-4336-8dca-6ececad5a6ab/styles.css">
<script src="../_ds/ml-animations-design-system-94795768-6cca-4336-8dca-6ececad5a6ab/_ds_bundle.js"></script>
<style>
:root { --bg:var(--anim-bg-dark); --fg:var(--color-dark-sage-12); --muted:var(--color-dark-sage-8); --line:var(--color-dark-sage-4); --glow-v:rgba(124,92,252,.2); }
*{box-sizing:border-box;margin:0}
html,body{height:100%}
body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);overflow-x:hidden}

/* Grid background */
body::before{content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(var(--line) 1px,transparent 1px),
    linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:60px 60px;opacity:.18;pointer-events:none;z-index:0}

.root{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* Header */
.hdr{padding:28px 36px 8px}
.hdr h1{font-size:26px;font-weight:700;letter-spacing:-.02em;
  background:linear-gradient(135deg,var(--color-violet-9),var(--color-teal-9));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{font-size:12px;color:var(--muted);margin-top:4px}

/* Toolbar */
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:4px 36px;flex-wrap:wrap;gap:8px}

/* Breadcrumb */
.bc{display:flex;align-items:center;gap:2px;flex-wrap:wrap}
.bc-btn{background:none;border:1px solid transparent;color:var(--muted);font:inherit;font-size:12px;
  padding:4px 10px;border-radius:6px;cursor:pointer;transition:.15s}
.bc-btn:hover{border-color:var(--line);color:var(--fg)}
.bc-btn.on{color:var(--color-violet-9);font-weight:700;cursor:default}
.bc-sep{color:var(--line);font-size:11px;margin:0 2px}

/* Ref panel */
.ref-panel{position:relative}
.ref-toggle{background:var(--line);border:none;color:var(--muted);font:inherit;font-size:11px;
  padding:5px 12px;border-radius:6px;cursor:pointer}
.ref-toggle:hover{color:var(--fg)}
.ref-img-wrap{position:fixed;right:16px;top:118px;z-index:80;
  background:var(--color-dark-sage-2);border:1px solid var(--line);border-radius:10px;padding:8px;
  box-shadow:0 12px 40px rgba(0,0,0,.75);
  max-height:calc(100vh - 140px);overflow-y:auto}
.ref-img{display:block;width:280px;height:auto;border-radius:6px;background:#fff}
.ref-img + .ref-img{margin-top:8px}

/* Level bar */
.level-bar{padding:6px 36px 10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.lv-badge{font-family:var(--font-mono);font-size:12px;font-weight:700;
  background:var(--color-violet-9);color:var(--anim-bg-dark);border-radius:999px;padding:3px 12px}
.lv-title{font-size:17px;font-weight:700}
.lv-desc{font-size:12px;color:var(--muted)}

/* Canvas */
.canvas{flex:1;display:flex;justify-content:center;align-items:flex-start;
  padding:20px 36px 100px;position:relative}
/* FLIP Zoom Overlay */
.zoom-overlay{position:absolute;border:2px solid;border-radius:12px;pointer-events:none;z-index:20}
.zoom-overlay.phase-a{
  animation:pulseGlow .15s ease forwards;
}
.zoom-overlay.phase-b{
  border-radius:16px;border:none;
  animation:expandFill .3s cubic-bezier(.4,0,.2,1) forwards;
  transform-origin:var(--ox) var(--oy);
}
@keyframes pulseGlow{
  0%{opacity:0;transform:scale(1)}
  100%{opacity:1;transform:scale(1.04)}
}
@keyframes expandFill{
  0%{opacity:.6;transform:scale(.15);border-radius:12px}
  100%{opacity:1;transform:scale(1);border-radius:0}
}

/* Canvas states during zoom */
.canvas.dimming .ab:not(:hover){opacity:.4!important;transition:opacity .15s}
.canvas.fade-in-content{animation:contentReveal .3s ease forwards}
.canvas.zoom-out-anim{animation:contentZoomOut .3s ease forwards}
@keyframes contentReveal{
  0%{opacity:0;transform:scale(1.08)}
  100%{opacity:1;transform:scale(1)}
}
@keyframes contentZoomOut{
  0%{opacity:0;transform:scale(.92)}
  100%{opacity:1;transform:scale(1)}
}

/* Block */
.ab{border:1.5px solid;border-radius:12px;padding:14px 22px;text-align:center;
  min-width:130px;position:relative;white-space:pre-line;
  font-size:13px;font-weight:600;line-height:1.45;transition:all .2s}
.ab.zoom:hover{transform:translateY(-2px)}
.ab:hover{z-index:50}
.ab-label{pointer-events:none}
.ab-zoom{position:absolute;right:8px;top:50%;transform:translateY(-50%);
  font-size:9px;opacity:.35}

/* Tags */
.tag{font-size:9px;font-weight:600;padding:2px 6px;border-radius:999px;
  position:absolute;white-space:nowrap}
.tag-reuse{top:-7px;right:6px;background:rgba(59,130,246,.2);color:var(--color-blue-7)}
.tag-pp{top:-7px;left:6px;background:rgba(229,162,27,.2);color:var(--color-amber-7)}
.tag-train{bottom:-7px;right:6px;background:rgba(100,116,108,.25);color:var(--color-dark-sage-9);font-style:italic}
.tag-ti{bottom:-11px;left:50%;transform:translateX(-50%);background:var(--color-amber-12);
  border:1px solid var(--color-amber-8);color:var(--color-amber-7);font-size:10px;padding:2px 10px;z-index:8}
.ab.dim{pointer-events:none}

/* Tooltip */
.tip{position:absolute;bottom:calc(100% + 12px);left:50%;transform:translateX(-50%);z-index:60;
  background:var(--color-dark-sage-3);color:var(--fg);font-size:11px;font-weight:400;
  padding:10px 14px;border-radius:8px;width:230px;text-align:left;
  box-shadow:0 8px 28px rgba(0,0,0,.6);z-index:25;pointer-events:none;
  line-height:1.55;white-space:normal;border:1px solid var(--line)}
.tip-title{font-weight:700;color:var(--color-violet-9)}

/* Arrow (points up — 원 논문 다이어그램처럼 아래→위 흐름) */
.ar{display:flex;flex-direction:column;align-items:center;position:relative;padding:3px 0}
.ar-line{width:2px;height:22px;background:var(--line);order:2}
.ar-head{width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;
  border-bottom:5px solid var(--muted);margin-bottom:-1px;order:1}
.ar-label{position:absolute;left:calc(50% + 14px);top:50%;transform:translateY(-50%);
  font-size:10px;color:var(--color-teal-9);font-weight:600;white-space:nowrap}
.ar-shape{position:absolute;right:calc(50% + 14px);top:50%;transform:translateY(-50%);
  font-size:9px;color:var(--muted);font-family:var(--font-mono);white-space:nowrap;opacity:.7}

/* Primitive badge (depth-independent) */
.lv-badge.p{background:var(--color-amber-8)}

/* Attention taxonomy chips */
.tax{display:inline-flex;gap:6px;margin-left:10px;vertical-align:middle}
.tax-chip{font-size:11px;font-family:var(--font-mono);border:1px solid var(--line);
  border-radius:999px;padding:2px 10px;color:var(--muted);white-space:nowrap}
.tax-chip b{color:var(--color-teal-9);font-weight:700;margin-right:5px}

/* Primitive leaf badge + side card */
.ab.prim-leaf{border-style:dashed}
.ab-prim-badge{position:absolute;left:-10px;top:-10px;font-family:var(--font-mono);font-size:10px;
  font-weight:700;background:var(--color-amber-12);color:var(--color-amber-8);border:1px solid var(--color-amber-8);
  border-radius:999px;padding:1px 7px;z-index:6}
.prim-card{position:absolute;bottom:calc(100% + 14px);left:50%;transform:translateX(-50%);
  background:var(--color-dark-sage-2);border:1px solid var(--color-amber-8);border-radius:10px;padding:14px 18px;
  width:280px;z-index:90;box-shadow:0 12px 40px rgba(0,0,0,.7);text-align:left;
  font-size:12px;line-height:1.6;white-space:normal}
.prim-card-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.prim-card-badge{font-family:var(--font-mono);font-size:10px;font-weight:700;
  background:var(--color-amber-8);color:var(--color-dark-sage-1);border-radius:999px;padding:2px 8px}
.prim-card-close{background:none;border:none;color:var(--muted);font-size:14px;
  cursor:pointer;margin-left:auto;padding:0 4px}
.prim-card-desc{color:var(--muted);margin:0 0 8px}
.prim-card-flow{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.prim-card-step{font-family:var(--font-mono);font-size:11px;padding:3px 8px;
  background:rgba(124,92,252,.15);border:1px solid rgba(124,92,252,.3);
  border-radius:6px;color:var(--color-dark-violet-11)}
.prim-card-step::after{content:' →';color:var(--muted);margin-left:4px}
.prim-card-step:last-child::after{content:''}

/* ×h head-count chip */
.ab-h{position:absolute;right:-20px;top:-12px;font-family:var(--font-mono);
  font-size:12px;font-weight:700;color:var(--color-violet-9)}

/* Ref source badges */
.ref-fig{margin:0 0 10px;display:flex;flex-direction:column;gap:4px}
.ref-src{font-size:10px;font-family:var(--font-mono);color:var(--muted);
  display:flex;align-items:center;gap:5px}
.ref-src::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--color-dark-sage-8);flex:none}
.ref-src-paper::before{background:var(--color-violet-9)}
.ref-src-jalammar::before{background:var(--color-teal-9)}

/* Graph layout (QKV branching) */
.lay-graph{display:flex;flex-direction:column-reverse;align-items:center;gap:44px;position:relative;padding:10px 40px}
.g-row{display:flex;gap:32px;align-items:stretch;justify-content:center}
.g-svg{position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:5;width:100%;height:100%}
.g-path{fill:none;stroke:var(--color-dark-sage-8);stroke-width:1.5;opacity:.85}
.g-lbl{font-family:var(--font-mono);font-size:11px;font-weight:700;fill:var(--color-teal-9)}

/* L1 unified stack */
.lay-l1{display:flex;gap:72px;align-items:flex-end;position:relative;padding-top:44px}
.l1-col{display:flex;flex-direction:column-reverse;align-items:center}
.l1-cap{font-size:11px;color:var(--muted);margin:6px 0;font-weight:600;text-align:center;white-space:pre-line}
.l1-svg{position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:5;width:100%;height:100%}
.l1-path{fill:none;stroke:var(--color-teal-9);stroke-width:1.6;opacity:.8}
.l1-mem{position:absolute;top:8px;left:50%;transform:translateX(-50%);
  font-size:10px;color:var(--color-teal-9);font-weight:700;white-space:nowrap}

/* Residual group + skip path */
.res-group{position:relative;display:flex;flex-direction:column-reverse;align-items:center;
  padding:6px 0}
.skip{position:absolute;left:-34px;top:16px;bottom:16px;width:20px;
  border:2px solid var(--color-dark-sage-6);border-right:none;border-radius:12px 0 0 12px}
.skip::after{content:'';position:absolute;top:-5px;right:-7px;
  border-top:4px solid transparent;border-bottom:4px solid transparent;
  border-left:7px solid var(--color-dark-sage-6)}
.skip-label{position:absolute;left:-6px;top:50%;transform:translate(-100%,-50%);white-space:nowrap;
  font-size:10px;color:var(--muted);font-family:var(--font-mono);font-weight:700}
.variant-note{font-size:11px;color:var(--color-amber-9);margin:0 0 12px;font-weight:600}

/* Layouts — column-reverse: 입력이 아래, 출력이 위 (원 논문 방향) */
.lay-v{display:flex;flex-direction:column-reverse;align-items:center;gap:0;max-width:340px}

.lay-l0{display:flex;align-items:flex-end;gap:0}
.l0-col{display:flex;flex-direction:column-reverse;align-items:center;gap:0;min-width:180px}
.l0-side-label{font-size:10px;font-weight:700;letter-spacing:.1em;
  color:var(--muted);margin-top:10px;text-transform:uppercase}
.l0-bridge{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 24px;align-self:center;margin-bottom:40px}
.l0-bridge-line{width:80px;height:2px;background:var(--color-teal-7);border-radius:1px;
  box-shadow:0 0 12px rgba(18,165,148,.3)}
.l0-bridge-label{font-size:10px;color:var(--color-teal-9);font-weight:700;margin-top:6px;text-align:center}
.bridge-shape{position:static!important;transform:none!important;margin-top:2px;text-align:center}

/* MHA row */
.mha-row{display:flex;gap:10px}

/* Back */
.back{position:fixed;bottom:20px;left:36px;background:var(--color-dark-sage-3);color:var(--fg);
  border:1px solid var(--line);padding:9px 18px;border-radius:8px;
  font:inherit;font-size:13px;font-weight:600;cursor:pointer;z-index:10;transition:.15s}
.back:hover{border-color:var(--color-violet-9);color:var(--color-violet-9)}

.empty{color:var(--muted);padding:40px}
</style>
</head>
